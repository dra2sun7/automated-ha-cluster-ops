---
# =================================================================
# [STEP 1] Bastion Host 자체에 접속하여 0원짜리 프록시 서버 빌드
# =================================================================
- name: "Bastion Host에 외부 패킷 중계용 Squid 프록시 서버 구축"
  hosts: kafka_nodes
  gather_facts: no
  run_once: true # 3대 노드가 동시에 Bastion을 수정하지 않도록 단 1회만 제어

  tasks:
    # 💡 핵심 논리: delegate_to를 삭제하고, 이미 검증된 Bastion 터널링 변수(ansible_ssh_common_args)에서 
    # ProxyCommand 뒤쪽에 숨어있는 Bastion의 진짜 '공인 IP'를 추출하여 직접 원격 명령을 보냅니다.
    - name: "Bastion Host 공인 IP로 다이렉트 접속하여 Squid 프록시 일괄 구성"
      vars:
        # ansible_ssh_common_args 문자열 맨 끝에 숨겨진 ubuntu@공인IP 추출
        bastion_ssh_target: "{{ ansible_ssh_common_args.split()[-1].replace('\"', '').replace(\"'\", '') }}"
      ansible.builtin.shell:
        cmd: |
          ssh -o StrictHostKeyChecking=no -i ../terraform/my-cluster-key {{ bastion_ssh_target }} "
            sudo apt-get update && \
            sudo apt-get install -y squid && \
            sudo sed -i 's/http_access deny all/http_access allow all/g' /etc/squid/squid.conf && \
            sudo systemctl restart squid
          "
      delegate_to: localhost # 내 로컬 PC에서 실행하되, 이번엔 '공인 IP'를 찌르므로 타임아웃 없이 완벽 통과합니다.
      changed_when: false

# =================================================================
# [STEP 2] 내부 격리 노드 최적화 및 Bastion 프록시 경유 Java 17 설치
# =================================================================
- name: "Phase 2: Bastion 프록시망을 경유한 OS 커널 최적화 및 Java 17 일괄 설치"
  hosts: kafka_nodes
  become: yes
  gather_facts: yes

  # 🚀 테라폼이 구워준 변수 그대로 프록시 환경변수 자동 매핑 (수동 개입 0%)
  environment:
    http_proxy: "http://{{ bastion_private_ip }}:3128"
    https_proxy: "http://{{ bastion_private_ip }}:3128"

  tasks:
    # -------------------------------------------------------------
    # [1] OS 패키지 매니저 업데이트 및 기본 툴 수혈
    # -------------------------------------------------------------
    - name: "우분투 apt 캐시 업데이트 및 필수 유틸리티 설치"
      apt:
        update_cache: yes
        name:
          - curl
          - gnupg2
          - htop
        state: present

    # -------------------------------------------------------------
    # [2] 호스트 가상 머신에 Java 17(JVM) 엔진 직접 주입
    # -------------------------------------------------------------
    - name: "OpenJDK 17 Headless 버전 일괄 설치"
      apt:
        name: openjdk-17-jdk-headless
        state: present

    - name: "Java 설치 완료 여부 및 버전 검증 확인"
      command: java -version
      register: java_version_output
      changed_when: false

    - name: "설치된 Java 버전 로그 출력"
      debug:
        msg: "{{ java_version_output.stderr_lines[0] }}"

    # -------------------------------------------------------------
    # [3] 빅데이터 처리를 위한 리눅스 OS 파일 개수 제한(Ulimit) 확장
    # -------------------------------------------------------------
    - name: "대규모 소켓/파일 처리를 위한 OS 자원 제한(Limits) 설정값 주입"
      pam_limits:
        domain: ubuntu
        limit_type: "{{ item.type }}"
        limit_item: "{{ item.item }}"
        value: "{{ item.value }}"
      loop:
        - { type: 'soft', item: 'nofile', value: '65536' }
        - { type: 'hard', item: 'nofile', value: '65536' }
        - { type: 'soft', item: 'nproc', value: '65536' }
        - { type: 'hard', item: 'nproc', value: '65536' }

    # -------------------------------------------------------------
    # [4] 가상 메모리 및 가상 파일 시스템 커널 튜닝 (Sysctl)
    # -------------------------------------------------------------
    - name: "카프카 인덱싱 성능 극대화를 위한 가상 파일 시스템 메모리 맵(vm.max_map_count) 커널 최적화"
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes
